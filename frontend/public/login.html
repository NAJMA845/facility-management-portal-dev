<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facility Pro - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/src/css/login.css">
</head>
<body>

    <div class="login-wrapper">
        <main class="login-card">
            
            <div class="brand-header">
                <div class="logo-icon">
                    <i class="fa-solid fa-building-shield"></i>
                </div>
                <span class="brand-name">Facility Pro</span>
            </div>

            <div class="welcome-text">
                <h2>Welcome Back!</h2>
                <p>Sign in to continue to your account</p>
            </div>

            <form id="loginForm" class="login-form">
                
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required autocomplete="email">
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="password-field-wrapper">
                        <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
                        <button type="button" id="togglePassword" class="toggle-password-btn" aria-label="Toggle password visibility">
                            <i class="fa-regular fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>

                <div class="form-actions">
                    <a href="#" class="forgot-password">Forgot Password?</a>
                </div>

                <button type="submit" class="btn-login">Login</button>

            </form>

        </main>

        <footer class="login-footer">
            <p>&copy; 2026 Facility Pro. All rights reserved.</p>
        </footer>
    </div>

    <script src="/src/js/api.js"></script>
    <script src="/src/js/auth-guard.js"></script>
    <script src="/src/js/login.js"></script>
</body>
</html>
