<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facility Pro - Settings</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/src/css/assets.css">
    <link rel="stylesheet" href="/src/css/sidebar-shell.css">
    <link rel="stylesheet" href="/src/css/modals.css">
</head>
<body>
    <div class="dashboard-container">
        <main class="main-content">
            <header class="top-navbar">
                <div class="header-left">
                    <button class="hamburger-btn"><i class="fa-solid fa-bars"></i></button>
                    <h1 class="page-title">Settings</h1>
                </div>
                <div class="header-right">
                    <button class="icon-notification-btn"><i class="fa-solid fa-magnifying-glass"></i></button>
                    <button class="icon-notification-btn"><i class="fa-regular fa-bell"></i></button>
                    <div class="user-profile">
                        <div class="avatar"><i class="fa-regular fa-user"></i></div>
                        <span class="user-role">User</span>
                    </div>
                </div>
            </header>

            <div class="dashboard-viewport">
                <div class="card data-management-card" style="max-width: 760px;">
                    <h2 style="margin-bottom: 16px;">Account Settings</h2>
                    <form id="settingsForm">
                        <div class="form-group">
                            <label for="settingsName">Display Name</label>
                            <input type="text" id="settingsName" name="name">
                            <div class="form-error"></div>
                        </div>
                        <div class="form-group">
                            <label for="settingsDepartment">Department</label>
                            <input type="text" id="settingsDepartment" name="department">
                            <div class="form-error"></div>
                        </div>
                        <div class="form-group">
                            <label for="settingsPhone">Phone</label>
                            <input type="tel" id="settingsPhone" name="phone">
                            <div class="form-error"></div>
                        </div>
                        <div class="form-group">
                            <label for="settingsBio">Bio</label>
                            <textarea id="settingsBio" name="bio"></textarea>
                            <div class="form-error"></div>
                        </div>
                        <div class="modal-footer" style="justify-content:flex-end; margin-top: 8px;">
                            <button type="button" class="btn-cancel" id="settingsResetBtn">Reset</button>
                            <button type="submit" class="btn-submit">Save Settings</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="/src/js/api.js"></script>
    <script src="/src/js/utils.js"></script>
    <script src="/src/js/settings-page.js"></script>
    <script src="/src/js/auth-guard.js"></script>
    <script src="/src/js/navigation.js"></script>
</body>
</html>
