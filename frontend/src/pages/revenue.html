<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facility Pro - Revenue</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/src/css/assets.css">
    <link rel="stylesheet" href="/src/css/sidebar-shell.css">
    <link rel="stylesheet" href="/src/css/modals.css">
    <style>
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }
        .summary-card {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 14px;
        }
        .summary-label { color: #64748b; font-size: 0.85rem; margin-bottom: 6px; }
        .summary-value { font-size: 1.25rem; font-weight: 700; color: #0f172a; }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <main class="main-content">
            <header class="top-navbar">
                <div class="header-left">
                    <button class="hamburger-btn"><i class="fa-solid fa-bars"></i></button>
                    <h1 class="page-title">Revenue</h1>
                </div>
                <div class="header-right">
                    <button class="icon-notification-btn"><i class="fa-solid fa-magnifying-glass"></i></button>
                    <button class="icon-notification-btn"><i class="fa-regular fa-bell"></i></button>
                    <div class="user-profile">
                        <div class="avatar"><i class="fa-regular fa-user"></i></div>
                        <span class="user-role">User</span>
                    </div>
                </div>
            </header>

            <div class="dashboard-viewport">
                <div class="summary-grid">
                    <div class="summary-card"><div class="summary-label">Monthly</div><div class="summary-value" id="revMonthly">$0</div></div>
                    <div class="summary-card"><div class="summary-label">Quarterly</div><div class="summary-value" id="revQuarterly">$0</div></div>
                    <div class="summary-card"><div class="summary-label">Yearly</div><div class="summary-value" id="revYearly">$0</div></div>
                    <div class="summary-card"><div class="summary-label">Total</div><div class="summary-value" id="revTotal">$0</div></div>
                </div>

                <div class="card data-management-card">
                    <div class="table-control-header-row">
                        <div class="search-input-wrapper">
                            <input type="text" placeholder="Search revenue entries..." class="search-bar-field" id="searchInput">
                            <i class="fa-solid fa-magnifying-glass search-inline-icon"></i>
                        </div>
                        <button class="primary-action-btn" id="addRevenueBtn"><i class="fa-solid fa-plus"></i> Add Revenue</button>
                    </div>

                    <div class="table-responsive">
                        <table class="management-grid">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Source</th>
                                    <th>Category</th>
                                    <th>Period</th>
                                    <th>Amount</th>
                                    <th class="text-right">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="revenueTableBody">
                                <tr><td colspan="6" class="empty-state">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="pagination" id="pagination"></div>
                </div>
            </div>
        </main>
    </div>

    <div id="revenueModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="revenueModalTitle">Add Revenue</h2>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <form id="revenueForm">
                    <div class="form-group">
                        <label for="revenueSource">Source *</label>
                        <input type="text" id="revenueSource" name="source" required>
                        <div class="form-error"></div>
                    </div>
                    <div class="form-group">
                        <label for="revenueCategory">Category</label>
                        <input type="text" id="revenueCategory" name="category" placeholder="e.g., Rent, Service">
                        <div class="form-error"></div>
                    </div>
                    <div class="form-group">
                        <label for="revenuePeriod">Period (YYYY-MM)</label>
                        <input type="month" id="revenuePeriod" name="period">
                        <div class="form-error"></div>
                    </div>
                    <div class="form-group">
                        <label for="revenueAmount">Amount *</label>
                        <input type="number" id="revenueAmount" name="amount" min="0" step="0.01" required>
                        <div class="form-error"></div>
                    </div>
                    <div class="form-group">
                        <label for="revenueNotes">Notes</label>
                        <textarea id="revenueNotes" name="notes"></textarea>
                        <div class="form-error"></div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel">Cancel</button>
                <button class="btn-submit">Save</button>
            </div>
        </div>
    </div>

    <script src="/src/js/api.js"></script>
    <script src="/src/js/utils.js"></script>
    <script src="/src/js/revenue.js"></script>
    <script src="/src/js/auth-guard.js"></script>
    <script src="/src/js/navigation.js"></script>
</body>
</html>
